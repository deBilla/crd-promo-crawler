services:
  # --- Infrastructure ---
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
      POSTGRES_USER: ${POSTGRES_USER:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawlerpass}
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crawler}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Monitoring Stack ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawlerpass}
      POSTGRES_DB: ${POSTGRES_DB:-crawler}
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports: ["9090:9090"]
    depends_on: [otel-collector]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/pipeline-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports: ["3001:3000"]
    depends_on: [prometheus]
    restart: unless-stopped

  # --- Application Services ---
  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      puppeteer:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawlerpass}@postgres:5432/${POSTGRES_DB:-crawler}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      PUPPETEER_URL: http://puppeteer:3000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_ENDPOINT: http://otel-collector:4317
      OTEL_ENABLED: "true"
    restart: unless-stopped

  parser:
    build:
      context: .
      dockerfile: services/parser/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      puppeteer:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawlerpass}@postgres:5432/${POSTGRES_DB:-crawler}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      PUPPETEER_URL: http://puppeteer:3000
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.1}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_ENDPOINT: http://otel-collector:4317
      OTEL_ENABLED: "true"
    restart: unless-stopped

  extractor:
    build:
      context: .
      dockerfile: services/extractor/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawlerpass}@postgres:5432/${POSTGRES_DB:-crawler}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.1}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_ENDPOINT: http://otel-collector:4317
      OTEL_ENABLED: "true"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawlerpass}@postgres:5432/${POSTGRES_DB:-crawler}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_ENDPOINT: http://otel-collector:4317
      OTEL_ENABLED: "true"
    restart: unless-stopped

  puppeteer:
    build: ./services/puppeteer
    ports: ["3000:3000"]
    restart: unless-stopped

volumes:
  redis-data:
  pg-data:
  minio-data:
  prometheus-data:
  grafana-data:
