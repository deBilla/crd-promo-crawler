global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector exports Prometheus metrics (app + Redis + Postgres)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # MinIO metrics (MINIO_PROMETHEUS_AUTH_TYPE=public)
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
